name: Web Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-web:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: root
          POSTGRES_DB: bd_intelligent_sales
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install and Test
        working-directory: utsk_web
        env:
          DATABASE_URL: postgresql://postgres:root@localhost:5432/bd_intelligent_sales
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: bd_intelligent_sales
          PGUSER: postgres
          PGPASSWORD: root
        run: |
          pip install fastapi uvicorn sqlalchemy psycopg2-binary pytest httpx
          python -m pytest tests/ -v --tb=short
