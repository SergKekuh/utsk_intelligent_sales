name: UTSK CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-cpp:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: root
          POSTGRES_DB: bd_intelligent_sales
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt update
          # libgtest-dev ОБЯЗАТЕЛЕН — без него нет исходников GTest
          sudo apt install -y cmake g++ pkg-config libpqxx-dev nlohmann-json3-dev libgtest-dev
      
      - name: Build GTest from source
        run: |
          cd /usr/src/gtest
          sudo cmake CMakeLists.txt
          sudo make -j$(nproc)
          # Копируем библиотеки в стандартное место
          sudo cp lib/libgtest.a /usr/lib/x86_64-linux-gnu/
          sudo cp lib/libgtest_main.a /usr/lib/x86_64-linux-gnu/
          # Проверяем
          ls -la /usr/lib/x86_64-linux-gnu/libgtest*.a
      
      - name: Build and Test UTSK
        working-directory: utsk_intelligent_sales
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: bd_intelligent_sales
          PGUSER: postgres
          PGPASSWORD: root
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS=ON
          cmake --build build -j $(nproc)
          ./build/tests/utsk_tests
