name: UTSK CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-cpp:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: root
          POSTGRES_DB: bd_intelligent_sales
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt update && sudo apt install -y cmake g++ pkg-config libpqxx-dev nlohmann-json3-dev libgtest-dev
      - name: Build GTest
        run: |
          cd /usr/src/gtest && sudo cmake . && sudo make
          sudo cp lib/libgtest.a lib/libgtest_main.a /usr/lib/x86_64-linux-gnu/
      - name: Build and Test
        working-directory: utsk_intelligent_sales
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS=ON
          cmake --build build -j $(nproc) 2>&1 | tail -20
          ./build/tests/utsk_tests
        env:
          PGPASSWORD: root

  test-web:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Auth tests only
        working-directory: utsk_web
        run: |
          pip install fastapi uvicorn sqlalchemy psycopg2-binary pytest httpx
          python -m pytest tests/ -v -k "auth or index"
