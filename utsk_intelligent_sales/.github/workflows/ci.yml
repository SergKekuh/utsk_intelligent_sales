name: UTSK CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-cpp:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: root
          POSTGRES_DB: bd_intelligent_sales
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y cmake g++ pkg-config libpqxx-dev nlohmann-json3-dev libgtest-dev postgresql-client
      
      - name: Build GTest
        run: |
          cd /usr/src/gtest
          sudo cmake CMakeLists.txt
          sudo make -j$(nproc)
          sudo cp lib/libgtest.a lib/libgtest_main.a /usr/lib/x86_64-linux-gnu/
      
      - name: Init DB schema
        env:
          PGPASSWORD: root
        run: |
          echo "=== Step 1: Testing connection ==="
          psql -h localhost -U postgres -d bd_intelligent_sales -c "SELECT 1 AS connection_test;"
          
          echo "=== Step 2: Creating clients table ==="
          psql -h localhost -U postgres -d bd_intelligent_sales -c "
            CREATE TABLE IF NOT EXISTS clients (
                code VARCHAR(50) PRIMARY KEY,
                name VARCHAR(255) NOT NULL
            );
          "
          
          echo "=== Step 3: Inserting test data ==="
          psql -h localhost -U postgres -d bd_intelligent_sales -c "
            INSERT INTO clients VALUES ('36', 'Test Client') ON CONFLICT DO NOTHING;
          "
          
          echo "=== Step 4: Verifying ==="
          psql -h localhost -U postgres -d bd_intelligent_sales -c "
            SELECT COUNT(*) AS client_count FROM clients;
          "
          echo "=== DONE ==="
      
      - name: Build and Test
        working-directory: utsk_intelligent_sales
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: bd_intelligent_sales
          PGUSER: postgres
          PGPASSWORD: root
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS=ON
          cmake --build build -j $(nproc)
          ./build/tests/utsk_tests

  test-web:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Auth tests
        working-directory: utsk_web
        run: |
          pip install fastapi uvicorn sqlalchemy psycopg2-binary pytest httpx
          python -m pytest tests/ -v -k "auth or index"
