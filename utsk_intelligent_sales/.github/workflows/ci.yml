name: UTSK CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]

jobs:
  test-cpp:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: root
          POSTGRES_DB: bd_intelligent_sales
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y cmake g++ pkg-config libpqxx-dev nlohmann-json3-dev libgtest-dev postgresql-client
      
      - name: Build GTest
        run: |
          cd /usr/src/gtest
          sudo cmake CMakeLists.txt
          sudo make -j$(nproc)
          # Проверяем, где реально лежат библиотеки
          echo "=== Searching for libgtest ==="
          find /usr -name "libgtest*.a" 2>/dev/null
          # Копируем в стандартное место
          sudo find /usr/src/gtest -name "libgtest.a" -exec cp {} /usr/lib/x86_64-linux-gnu/ \;
          sudo find /usr/src/gtest -name "libgtest_main.a" -exec cp {} /usr/lib/x86_64-linux-gnu/ \;
          ls -la /usr/lib/x86_64-linux-gnu/libgtest*.a
      
      - name: Init DB
        env:
          PGPASSWORD: root
        run: |
          psql -h localhost -U postgres -d bd_intelligent_sales -c "CREATE TABLE IF NOT EXISTS clients (code VARCHAR(50), name VARCHAR(255))"
          psql -h localhost -U postgres -d bd_intelligent_sales -c "INSERT INTO clients VALUES ('36','Test') ON CONFLICT DO NOTHING"
          psql -h localhost -U postgres -d bd_intelligent_sales -c "SELECT COUNT(*) FROM clients"
      
      - name: Build and Test
        working-directory: utsk_intelligent_sales
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: bd_intelligent_sales
          PGUSER: postgres
          PGPASSWORD: root
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS=ON
          cmake --build build -j $(nproc)
          ./build/tests/utsk_tests
