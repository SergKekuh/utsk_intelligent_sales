name: UTSK CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-cpp:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: root
          POSTGRES_DB: bd_intelligent_sales
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y cmake g++ pkg-config libpqxx-dev nlohmann-json3-dev libgtest-dev
      
      - name: Build GTest
        run: |
          cd /usr/src/gtest
          sudo cmake CMakeLists.txt
          sudo make -j$(nproc)
          echo "=== Checking GTest build ==="
          find /usr/src/gtest -name "*.a" -ls
          ls -la lib/ 2>/dev/null || echo "No lib/ directory"
      
      - name: Init DB schema
        env:
          PGPASSWORD: root
        run: |
          psql -h localhost -U postgres -d bd_intelligent_sales << 'SQL'
          CREATE TABLE IF NOT EXISTS clients (code VARCHAR(50) PRIMARY KEY, name VARCHAR(255) NOT NULL);
          INSERT INTO clients VALUES ('36', 'Test') ON CONFLICT DO NOTHING;
          SQL
      
      - name: Build and Test
        working-directory: utsk_intelligent_sales
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: bd_intelligent_sales
          PGUSER: postgres
          PGPASSWORD: root
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS=ON
          cmake --build build -j $(nproc)
          ./build/tests/utsk_tests

  test-web:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Auth tests
        working-directory: utsk_web
        run: |
          pip install fastapi uvicorn sqlalchemy psycopg2-binary pytest httpx
          python -m pytest tests/ -v -k "auth or index"
