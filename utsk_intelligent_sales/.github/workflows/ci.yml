name: UTSK CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-cpp:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: root
          POSTGRES_DB: bd_intelligent_sales
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake g++ pkg-config libpqxx-dev nlohmann-json3-dev libgtest-dev
      
      - name: Compile and install GTest
        run: |
          cd /usr/src/gtest && sudo cmake . && sudo make
          sudo cp lib/libgtest.a lib/libgtest_main.a /usr/lib/x86_64-linux-gnu/
      
      - name: Init database schema
        env:
          PGPASSWORD: root
        run: |
          # Создаём минимальную схему для тестов
          psql -h localhost -U postgres -d bd_intelligent_sales << 'SQL'
          CREATE TABLE IF NOT EXISTS clients (
              code VARCHAR(50) PRIMARY KEY,
              name VARCHAR(255) NOT NULL,
              current_status_id INT,
              activity_direction_id INT,
              last_purchase_date DATE,
              first_purchase_date DATE,
              requires_survey BOOLEAN DEFAULT FALSE
          );
          CREATE TABLE IF NOT EXISTS status_rules (
              id SERIAL PRIMARY KEY,
              status_name VARCHAR(50) NOT NULL,
              priority INT NOT NULL
          );
          -- Добавляем тестовые данные
          INSERT INTO clients (code, name) VALUES ('36', 'Test Client') ON CONFLICT DO NOTHING;
          SQL
          echo "✅ Schema initialized"
      
      - name: Build and Test C++
        working-directory: utsk_intelligent_sales
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: bd_intelligent_sales
          PGUSER: postgres
          PGPASSWORD: root
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS=ON
          cmake --build build -j $(nproc)
          ./build/tests/utsk_tests

  test-web:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Auth and index tests
        working-directory: utsk_web
        run: |
          pip install fastapi uvicorn sqlalchemy psycopg2-binary pytest httpx
          python -m pytest tests/ -v -k "auth or index"
